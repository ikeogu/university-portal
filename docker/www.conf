[www]
user = www-data
group = www-data

; TCP, not a unix socket — listen.owner/group/mode don't apply here.
listen = 127.0.0.1:9000

pm = dynamic
pm.max_children = 10
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 4

; Without this, PHP-FPM strips almost all shell environment variables from
; the request-handling worker processes — Railway's injected DB_HOST,
; APP_KEY, etc. would then be invisible to the app at request time even
; though the CLI-invoked `artisan config:cache` (run directly, not through
; a worker) sees them fine during the image's own startup sequence. Since
; config is cached once at container start with whatever env was visible
; then, this specifically matters if that first config:cache run didn't
; see everything it needed.
clear_env = no

; Without this, fatal PHP errors in a worker (as opposed to exceptions
; Laravel's own handler catches and logs) don't get forwarded to php-fpm's
; own stdout/stderr, which supervisord/Railway otherwise capture — so a
; genuine PHP-level crash can fail completely silently, with nothing to
; diagnose from.
catch_workers_output = yes
decorate_workers_output = no
